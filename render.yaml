services:
  - type: web
    name: arise-dash-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn DASH:server --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATA_URL
        value: https://raw.githubusercontent.com/leko94/ARISE_DASH_DASHBOARD/main/Stokvel_20260719.xlsx
      - key: EXCEL_FILE
        value: Stokvel_20260719.xlsx
      - key: SHEET_NAME
        value: Sheet1
      - key: REFRESH_SECONDS
        value: "60"
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
